name: Sync Backend to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - ".python-version"
      - ".github/workflows/sync-hf-space.yml"
      - "deploy/hf-space/**"
      - "best_dr_fixed_model.pth"
      - "main.py"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  sync-space:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face Hub client
        run: python -m pip install --upgrade "huggingface_hub>=0.32.0"

      - name: Assemble Space payload
        run: |
          mkdir -p space-build
          cp deploy/hf-space/README.md space-build/README.md
          cp deploy/hf-space/Dockerfile space-build/Dockerfile
          cp .python-version space-build/.python-version
          cp main.py space-build/main.py
          cp requirements.txt space-build/requirements.txt
          cp best_dr_fixed_model.pth space-build/best_dr_fixed_model.pth

      - name: Validate required configuration
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing GitHub Actions secret: HF_TOKEN"
            exit 1
          fi
          if [ -z "$HF_SPACE_ID" ]; then
            echo "Missing GitHub Actions variable: HF_SPACE_ID"
            exit 1
          fi

      - name: Upload Space files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="space-build",
              repo_id=os.environ["HF_SPACE_ID"],
              repo_type="space",
              commit_message="Sync from GitHub",
          )
          PY
